<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation | Roel & Mailyn</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* ENTRY */
#entry {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, rgba(255,255,255,0.08), #000 70%);
    cursor: pointer;
    position: relative;
}

/* ENVELOPE WRAPPER */
.envelope-wrapper {
    position: relative;
    text-align: center;
}

/* ENVELOPE */
.envelope-img {
    width: min(90%, 650px);
    height: auto;
    filter: drop-shadow(0 25px 50px rgba(0,0,0,0.6));
    transition: all 0.6s ease;
}

/* WAX SEAL */
.wax-seal {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translate(-50%, -10%);
    width: 70px;
    height: 70px;
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #7a0000);
    border-radius: 50%;
    box-shadow:
        0 10px 25px rgba(0,0,0,0.6),
        inset 0 3px 6px rgba(255,255,255,0.2);
    display: flex;
    justify-content: center;
    align-items: center;

    animation: pulseSeal 2.5s infinite;
    transition: transform 0.6s ease, opacity 0.6s ease;
}

/* HEART INSIDE SEAL */
.wax-seal::after {
    content: "♥";
    color: rgba(255,255,255,0.85);
    font-size: 20px;
}

/* PULSE GLOW */
@keyframes pulseSeal {
    0% { box-shadow: 0 0 10px rgba(255,0,0,0.3), 0 10px 25px rgba(0,0,0,0.6); }
    50% { box-shadow: 0 0 25px rgba(255,80,80,0.6), 0 10px 25px rgba(0,0,0,0.6); }
    100% { box-shadow: 0 0 10px rgba(255,0,0,0.3), 0 10px 25px rgba(0,0,0,0.6); }
}

/* CLICK HINT */
.hint {
    margin-top: 15px;
    font-size: 0.8rem;
    letter-spacing: 2px;
    opacity: 0.6;
}

/* SEAL BREAK ANIMATION */
.break .wax-seal {
    transform: translate(-50%, -10%) scale(0.2) rotate(20deg);
    opacity: 0;
}

/* ENVELOPE OPEN EFFECT */
.break .envelope-img {
    transform: scale(0.98);
    opacity: 0.3;
}

/* LETTER REVEAL */
.letter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, 20%);
    width: 80%;
    max-width: 600px;
    background: #fff;
    color: #000;
    padding: 40px;
    border-radius: 10px;
    opacity: 0;
    transition: all 1s ease;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.break .letter {
    transform: translate(-50%, -50%);
    opacity: 1;
}

/* MAIN SITE */
#site {
    display: none;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
}

nav a {
    color: #fff;
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 2px;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url("wedding2.jpg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.names {
    font-family: 'Alex Brush', cursive;
    font-size: clamp(3.5rem, 12vw, 5.5rem);
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: 0;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" onclick="openInvite()">
    <div class="envelope-wrapper">
        <img src="Enveloped.png" class="envelope-img">
        <div class="wax-seal"></div>

        <!-- hidden letter (unfold effect) -->
        <div class="letter">
            <h2>Roel & Mailyn</h2>
            <p>You are cordially invited to our wedding.</p>
        </div>
    </div>

    <p class="hint">Click to break the seal</p>
</div>

<!-- MAIN SITE -->
<div id="site">

<nav>
    <a href="#home">Home</a>
    <a href="#details">Details</a>
    <a href="#schedule">Schedule</a>
    <a href="#rsvp">RSVP</a>
</nav>

<section class="hero" id="home">
    <h1 class="names">Roel & Mailyn</h1>
</section>

</div>

<!-- MUSIC -->
<audio id="music" src="wedding-music.mp3"></audio>

<script>
function openInvite() {
    const entry = document.getElementById('entry');

    // break seal animation
    entry.classList.add('break');

    document.getElementById('music').play();

    // wait then transition to site
    setTimeout(() => {
        entry.style.opacity = '0';

        setTimeout(() => {
            entry.style.display = 'none';
            document.getElementById('site').style.display = 'block';
        }, 800);

    }, 1200);

    // confetti
    for (let i = 0; i < 40; i++) {
        let c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = ['#fff', '#ffd700', '#ffb6c1'][Math.floor(Math.random()*3)];
        c.style.animationDuration = (2 + Math.random()*2) + 's';
        document.body.appendChild(c);

        setTimeout(() => c.remove(), 4000);
    }
}
</script>

</body>
</html>
