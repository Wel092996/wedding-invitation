<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Roel & Mailyn</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: #fff;
            color: #fff;
            overflow-x: hidden;
        }

        /* NAVIGATION */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* HERO SECTION - BALANCED FOR LAPTOP */
        .hero {
            position: relative;
            min-height: 100vh;
            background: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url("wedding2.jpg") center center / cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers content vertically */
            align-items: center;
            text-align: center;
            padding: 80px 20px; /* Reduced top padding for better balance */
            box-sizing: border-box;
            z-index: 2;
        }

        .hero::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%; /* Balanced the fade height */
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(255,255,255,1) 100%);
            z-index: 1;
        }

        .hero > * {
            position: relative;
            z-index: 5;
            text-shadow: 0px 2px 8px rgba(0,0,0,0.4);
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 8vw, 6.5rem); /* Slightly smaller max size for laptop balance */
            margin: 15px 0;
            line-height: 1.1;
        }

        .names span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: letterIn 0.5s ease forwards;
            animation-delay: calc(var(--i) * 0.05s);
        }

        @keyframes letterIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .invite-message {
            max-width: 600px;
            font-weight: 300;
            line-height: 1.6;
            font-size: clamp(0.9rem, 1.2vw, 1.1rem);
            margin: 0 auto 20px;
        }

        .countdown-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 4vw, 3rem);
            margin-top: 20px;
        }

        .countdown-container {
            display: flex;
            gap: clamp(15px, 3vw, 40px);
            margin-top: 15px;
            background: rgba(0,0,0,0.25);
            padding: 20px 30px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }

        .countdown-number { 
            font-size: clamp(1.8rem, 4vw, 2.8rem); 
            font-weight: 600; 
            display: block;
        }

        .countdown-label { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 5px;
            opacity: 0.9;
        }

        /* DETAILS SECTION - REDUCED LAPTOP GAP */
        #details {
            padding: 0;
            margin-top: -80px; /* Pulls the image up into the fade slightly */
            position: relative;
            z-index: 6; 
            line-height: 0;
            background: #fff;
        }

        .details-image {
            width: 100%;
            max-width: 1200px; /* Prevents image from being too huge on big monitors */
            margin: 0 auto;
            height: auto;
            display: block;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 10%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 10%);
        }

        /* MOBILE SPECIFIC OVERRIDES */
        @media (max-width: 480px) {
            .hero { 
                padding-top: 100px; 
                justify-content: flex-start; /* Better for small screens */
            }
            .names { font-size: 3.2rem; }
            #details { margin-top: -40px; } 
            .countdown-container { padding: 15px; }
        }

        section:not(.hero):not(#details) {
            padding: 60px 20px;
            text-align: center;
            background: #fff;
            color: #4A2E2E;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#details">Details</a>
        <a href="#schedule">Schedule</a>
        <a href="#rsvp">RSVP</a>
    </nav>

    <section class="hero" id="home">
        <p style="letter-spacing: 2px; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 0;">You are cordially invited to the wedding of</p>
        
        <h1 class="names">
            <span style="--i:1">R</span><span style="--i:2">o</span><span style="--i:3">e</span><span style="--i:4">l</span>
            <br><span style="--i:5">&</span><br>
            <span style="--i:6">M</span><span style="--i:7">a</span><span style="--i:8">i</span><span style="--i:9">l</span><span style="--i:10">y</span><span style="--i:11">n</span>
        </h1>

        <p class="invite-message">
            Together with love and happiness, we invite you to witness and celebrate the beginning of our married life.
        </p>

        <h2 class="countdown-title">Countdown to Forever</h2>

        <div class="countdown-container">
            <div class="countdown-item"><span class="countdown-number" id="days">00</span><span class="countdown-label">Days</span></div>
            <div class="countdown-item"><span class="countdown-number" id="hours">00</span><span class="countdown-label">Hrs</span></div>
            <div class="countdown-item"><span class="countdown-number" id="minutes">00</span><span class="countdown-label">Min</span></div>
            <div class="countdown-item"><span class="countdown-number" id="seconds">00</span><span class="countdown-label">Sec</span></div>
        </div>
    </section>

    <section id="details">
        <img src="ok.png" alt="Wedding Details" class="details-image">
    </section>

    <section id="schedule">
        <h2 style="font-family: 'Great Vibes', cursive; font-size: 3rem;">Program</h2>
        <p>💍 Ceremony - 9:00 AM</p>
        <p>🍽 Reception to follow</p>
    </section>

    <script>
        (function() {
            const targetDate = new Date("June 8, 2026 09:00:00").getTime();
            const elements = {
                d: document.getElementById("days"),
                h: document.getElementById("hours"),
                m: document.getElementById("minutes"),
                s: document.getElementById("seconds")
            };

            function update() {
                const now = new Date().getTime();
                const diff = targetDate - now;

                if (diff <= 0) {
                    elements.d.innerHTML = "00"; elements.h.innerHTML = "00";
                    elements.m.innerHTML = "00"; elements.s.innerHTML = "00";
                    return;
                }

                elements.d.innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                elements.h.innerHTML = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                elements.m.innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                elements.s.innerHTML = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }

            setInterval(update, 1000);
            update();
        })();
    </script>
</body>
</html>
