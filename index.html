<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Roel & Mailyn</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }
        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: #fff; color: #4A2E2E;
            overflow-x: hidden;
        }

        nav {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            padding: 20px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); z-index: 1000;
        }
        nav a {
            color: #fff; text-decoration: none;
            font-size: 0.75rem; letter-spacing: 2px; font-weight: 500;
        }

        .hero {
            position: relative; min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url("wedding2.jpg") center center / cover no-repeat;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 80px 20px;
            box-sizing: border-box; z-index: 2; color: #fff;
        }

        .hero-content {
            position: relative; z-index: 5; width: 100%;
            max-width: 800px; text-shadow: 0px 2px 10px rgba(0,0,0,0.5);
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 10vw, 6.5rem);
            line-height: 1.1;
            margin: 0; 
            padding-top: 2.5rem;
            padding-bottom: 10px;
        }

        .names span {
            display: inline-block; opacity: 0; transform: translateY(20px);
            animation: letterIn 0.5s ease forwards;
            animation-delay: calc(var(--i) * 0.05s);
        }

        @keyframes letterIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .invite-message {
            max-width: 600px;
            margin: 18px auto 10px auto;
            font-weight: 300;
            line-height: 1.8;
            font-size: 0.9rem;
        }

        #location {
            margin-top: -40px;
            padding-top: 40px;
        }

        .content-section {
            padding: 80px 20px;
            text-align: center;
        }

        /* =========================
           LOCATION (UNIFORM FONT FIX)
        ========================== */

        .content-section h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin-bottom: 25px;
            color: #4A2E2E;
        }

        .location-grid {
            display: flex; flex-wrap: wrap;
            justify-content: center; gap: 25px;
            max-width: 1000px; margin: 0 auto;
        }

        .location-card {
            flex: 1; min-width: 300px;
            padding: 50px 25px;
            border-radius: 20px;
            background: #fdfaf9;
            border: 1px solid #f2ece9;
        }

        .venue-icon {
            font-size: 5rem;
            margin-bottom: 18px;
            display: block;
        }

        /* UNIFORM FONT SYSTEM */
        .location-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 1.55rem;
            line-height: 1.5;
            letter-spacing: 0.2px;
            margin-bottom: 10px;
            color: #4A2E2E;
        }

        .map-btn {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 35px;
            border: 1.5px solid #4A2E2E;
            color: #4A2E2E;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .map-btn:hover {
            background: #4A2E2E;
            color: #fff;
        }

    </style>
</head>

<body>

<section id="location" class="content-section">
    <h2>Location</h2>

    <div class="location-grid">

        <div class="location-card">
            <span class="venue-icon">⛪</span>
            <div class="location-title">
                St. Vincent Ferrer Parish & Diocesan Shrine
            </div>
            <a href="#" class="map-btn">GET DIRECTIONS</a>
        </div>

        <div class="location-card">
            <span class="venue-icon">🥂</span>
            <div class="location-title">
                Zone-4 Buang, Tabaco City, Albay
            </div>
            <a href="#" class="map-btn">GET DIRECTIONS</a>
        </div>

    </div>
</section>

</body>
</html>
