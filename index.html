<section id="rsvp" style="background:#fff; padding:50px 20px; text-align:center; color:#4A2E2E;">
    <h2 style="font-family:'Great Vibes', cursive; font-size:3rem; margin-bottom:10px;">RSVP</h2>
    <p style="font-size:0.9rem; letter-spacing:1px; margin-bottom:25px;">
        Kindly confirm your attendance
    </p>

    <form action="YOUR_FORM_ACTION_URL"
          method="POST"
          target="hidden_iframe"
          onsubmit="submitted=true;"
          style="max-width:400px; margin:0 auto; display:flex; flex-direction:column; gap:12px;">

        <!-- NAME -->
        <input name="entry.1111111111" type="text" placeholder="Full Name" required
        style="padding:12px; border-radius:8px; border:1px solid #ccc; font-family:Montserrat;">

        <!-- ATTENDANCE -->
        <select name="entry.2222222222" required
        style="padding:12px; border-radius:8px; border:1px solid #ccc; font-family:Montserrat;">
            <option value="">Will you attend?</option>
            <option value="Yes">Yes, I will attend</option>
            <option value="No">Sorry, I can't make it</option>
        </select>

        <!-- NUMBER OF GUESTS -->
        <input name="entry.3333333333" type="number" min="0"
        placeholder="How many will you bring (excluding yourself)?"
        style="padding:12px; border-radius:8px; border:1px solid #ccc; font-family:Montserrat;">

        <!-- MESSAGE -->
        <textarea name="entry.4444444444" placeholder="Message (optional)"
        style="padding:12px; border-radius:8px; border:1px solid #ccc; font-family:Montserrat;"></textarea>

        <button type="submit"
        style="padding:12px; border:none; background:#4A2E2E; color:#fff; border-radius:25px; font-size:0.75rem; letter-spacing:2px; cursor:pointer;">
            SEND RSVP
        </button>

    </form>

    <p id="rsvpResponse" style="margin-top:15px; font-size:0.8rem;"></p>

    <!-- hidden iframe to prevent redirect -->
    <iframe name="hidden_iframe" style="display:none;"></iframe>
</section>
