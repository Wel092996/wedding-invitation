<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation | Roel & Mailyn</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #fff;
    scroll-behavior: smooth;
}

/* ENTRY */
#entry {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a1a, #000);
}

/* 💎 GLASS INVITE CARD */
.invite-card {
    width: 280px;
    padding: 35px 25px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(12px);
    text-align: center;
    cursor: pointer;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.invite-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

.invite-card h2 {
    font-weight: 300;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

.invite-card p {
    font-size: 0.85rem;
    opacity: 0.8;
}

/* MAIN SITE */
#site {
    display: none;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    z-index: 1000;
}

nav a {
    color: #fff;
    text-decoration: none;
    font-size: 0.85rem;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url("wedding2.jpg") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.intro-text {
    font-size: 0.85rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 60px;
}

.names {
    font-family: 'Alex Brush', cursive;
    font-size: clamp(3.5rem, 12vw, 5.5rem);
    opacity: 0;
    animation: fadeIn 3s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* SECTIONS */
section {
    padding: 80px 20px;
    text-align: center;
}

.card {
    max-width: 600px;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    background: gold;
    top: 0;
    animation: fall 3s linear;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">
    <div class="invite-card" onclick="openInvite()">
        <h2>Roel & Mailyn</h2>
        <p>Tap to Open Invitation</p>
    </div>
</div>

<!-- SITE -->
<div id="site">

<nav>
    <a href="#home">Home</a>
    <a href="#details">Details</a>
    <a href="#schedule">Schedule</a>
    <a href="#rsvp">RSVP</a>
</nav>

<section class="hero" id="home">
    <p class="intro-text">You are cordially invited to the wedding of</p>
    <h1 class="names">Roel & Mailyn</h1>
</section>

<section id="details">
    <h2>Wedding Details</h2>
    <div class="card">
        <p><strong>Date:</strong> Coming Soon</p>
        <p><strong>Venue:</strong> To Be Announced</p>
    </div>
</section>

<section id="schedule">
    <h2>Program</h2>
    <div class="card">
        <p>💍 Ceremony - 3:00 PM</p>
        <p>📸 Photos - 4:30 PM</p>
        <p>🍽 Reception - 6:00 PM</p>
    </div>
</section>

<section id="rsvp">
    <h2>RSVP</h2>
    <div class="card">
        <input type="text" placeholder="Your Name"><br><br>
        <input type="email" placeholder="Email"><br><br>
        <textarea placeholder="Message"></textarea><br><br>
        <button onclick="alert('RSVP Sent!')">Send RSVP</button>
    </div>
</section>

</div>

<!-- MUSIC -->
<audio id="music" src="wedding-music.mp3"></audio>

<script>
function openInvite() {
    document.getElementById('entry').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('entry').style.display = 'none';
        document.getElementById('site').style.display = 'block';
    }, 500);

    document.getElementById('music').play();

    // Confetti
    for (let i = 0; i < 40; i++) {
        let c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = ['#fff', '#ffd700', '#ffb6c1'][Math.floor(Math.random()*3)];
        c.style.animationDuration = (2 + Math.random()*2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}
</script>

</body>
</html>
