<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation | Roel & Mailyn</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #1a1a1a;
    color: #fff;
    overflow-x: hidden;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
}

nav a {
    color: #fff;
    text-decoration: none;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.hero {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: url("wedding2.jpg") center center / cover no-repeat;
}

.hero-content { max-width: 800px; padding: 20px; }

.top-invite {
    letter-spacing: 3px;
    font-size: clamp(0.85rem, 3vw, 1.1rem);
    font-weight: 300;
    margin-bottom: 10px;
}

.names {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3rem, 10vw, 6.5rem);
    line-height: 1.1;
    margin: 7vh 0 2vh 0;
    color: #fff;
    animation: nameIntro 2s ease forwards;
    text-shadow: 0 6px 18px rgba(0,0,0,0.45);
}

@keyframes nameIntro {
    0% { opacity: 0; letter-spacing: 12px; transform: translateY(20px); }
    100% { opacity: 1; letter-spacing: 0px; transform: translateY(0px); }
}

.invite-message {
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
    text-shadow: 0px 2px 6px rgba(0,0,0,0.6);
}

.countdown-wrapper { margin-top: 40px; }

.countdown-title {
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 0.7rem;
    margin-bottom: 10px;
    font-weight: 600;
}

.countdown-container {
    display: inline-flex;
    gap: 10px;
    background: rgba(0,0,0,0.4);
    padding: 10px 18px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
}

.countdown-item { min-width: 45px; text-align:center; }

.countdown-number {
    font-size: 1.5rem;
    font-weight: 600;
    display: block;
}

.countdown-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    opacity: 0.7;
}

/* RSVP */
.rsvp {
    background:#fff;
    padding:50px 20px;
    text-align:center;
    color:#4A2E2E;
}

.rsvp h2 {
    font-family:'Great Vibes', cursive;
    font-size:3rem;
}

.rsvp form {
    max-width:400px;
    margin:20px auto;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.rsvp input,
.rsvp select {
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

.rsvp button {
    padding:12px;
    background:#4A2E2E;
    color:#fff;
    border:none;
    border-radius:25px;
    cursor:pointer;
}

.hidden { display:none; }

</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#details">Details</a>
<a href="#entourage">Entourage</a>
</nav>

<section class="hero" id="home">
<div class="hero-content">

<p class="top-invite">You are cordially invited to the wedding of</p>

<h1 class="names">
Roel<br>&<br>Mailyn
</h1>

<div class="invite-message">
Together with love and happiness we invite you to witness and celebrate the beginning of our married life.
</div>

<div class="countdown-wrapper">
<div class="countdown-title">Countdown to the Big Day</div>

<div class="countdown-container">
<div class="countdown-item"><span id="days" class="countdown-number">00</span><span class="countdown-label">Days</span></div>
<div class="countdown-item"><span id="hours" class="countdown-number">00</span><span class="countdown-label">Hrs</span></div>
<div class="countdown-item"><span id="minutes" class="countdown-number">00</span><span class="countdown-label">Min</span></div>
<div class="countdown-item"><span id="seconds" class="countdown-number">00</span><span class="countdown-label">Sec</span></div>
</div>

</div>
</div>
</section>

<section class="rsvp" id="rsvp">

<h2>RSVP</h2>

<form>

<input type="text" placeholder="Full Name" required>

<select id="attend" required>
<option value="">Will you attend?</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<div id="guestFields">
<input type="text" placeholder="Who will you bring?">
<input type="number" placeholder="How many guests?">
</div>

<button type="submit">Send RSVP</button>

</form>
</section>

<script>

/* COUNTDOWN */
const weddingDate = new Date("June 8, 2026 00:00:00").getTime();

setInterval(() => {
const now = new Date().getTime();
const d = weddingDate - now;

if (d <= 0) {
document.querySelector(".countdown-container").innerHTML =
"Today is the Day 🎉";
return;
}

document.getElementById("days").innerText = Math.floor(d / (1000*60*60*24));
document.getElementById("hours").innerText = Math.floor((d%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerText = Math.floor((d%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerText = Math.floor((d%(1000*60))/1000);

},1000);


/* AUTO HIDE GUEST FIELDS */
document.getElementById("attend").addEventListener("change", function() {
const guest = document.getElementById("guestFields");

if (this.value === "no") {
guest.classList.add("hidden");
} else {
guest.classList.remove("hidden");
}
});

</script>

</body>
</html>
