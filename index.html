<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invitation</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #fdf6f0;
      text-align: center;
      padding: 50px;
      color: #4a3f35;
    }
    .card {
      border: 2px solid #d4af7f;
      padding: 30px;
      border-radius: 15px;
      background: white;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're Invited!</h1>
    <h2>Your Name & Partner's Name</h2>
    <p>Date: Your Date</p>
    <p>Time: Your Time</p>
    <p>Venue: Your Venue</p>
  </div>
</body>
</html>
