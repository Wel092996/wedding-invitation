<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation | Roel & Mailyn</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #fff;
    scroll-behavior: smooth;
}

/* ENTRY SCREEN */
#entry {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, rgba(255,255,255,0.08), #000 70%);
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

/* ENVELOPE IMAGE (PREMIUM CLEAN EDGES) */
.envelope-img {
    width: min(90%, 650px);
    height: auto;
    object-fit: contain;

    /* CLEAN RENDERING */
    image-rendering: auto;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transform: translateZ(0);
    will-change: transform;

    /* DEPTH + GLOW */
    filter:
        drop-shadow(0 25px 50px rgba(0,0,0,0.55))
        drop-shadow(0 0 10px rgba(255,255,255,0.08));

    border-radius: 12px;

    transition: transform 0.4s ease, filter 0.4s ease;
}

/* HOVER LIFT EFFECT */
.envelope-img:hover {
    transform: translateY(-10px) scale(1.03);
    filter:
        drop-shadow(0 35px 70px rgba(0,0,0,0.6))
        drop-shadow(0 0 15px rgba(255,255,255,0.12));
}

/* CLICK HINT */
.hint {
    margin-top: 15px;
    font-size: 0.8rem;
    letter-spacing: 2px;
    opacity: 0.6;
}

/* MAIN SITE */
#site {
    display: none;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    z-index: 1000;
}

nav a {
    color: #fff;
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 2px;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url("wedding2.jpg") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.intro-text {
    font-size: 0.85rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 60px;
}

.names {
    font-family: 'Alex Brush', cursive;
    font-size: clamp(3.5rem, 12vw, 5.5rem);
    margin: 0;
    opacity: 0;
    animation: fadeIn 3s ease forwards;
}

/* FADE ONLY */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* SECTIONS */
section {
    padding: 80px 20px;
    text-align: center;
}

h2 {
    font-size: 1.8rem;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.card {
    max-width: 600px;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
}

/* FORM */
input, textarea {
    width: 90%;
    max-width: 400px;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px 20px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
    margin-top: 10px;
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: 0;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* MOBILE */
@media (max-width: 600px) {
    .intro-text { font-size: 0.75rem; }
    .names { font-size: 3.8rem; }
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" onclick="openInvite()">
    <img src="Enveloped.png" alt="Invitation" class="envelope-img">
    <p class="hint">Click to open invitation</p>
</div>

<!-- MAIN SITE -->
<div id="site">

<nav>
    <a href="#home">Home</a>
    <a href="#details">Details</a>
    <a href="#schedule">Schedule</a>
    <a href="#rsvp">RSVP</a>
</nav>

<section class="hero" id="home">
    <p class="intro-text">You are cordially invited to the wedding of</p>
    <h1 class="names">Roel & Mailyn</h1>
</section>

<section id="details">
    <h2>Wedding Details</h2>
    <div class="card">
        <p><strong>Date:</strong> Coming Soon</p>
        <p><strong>Venue:</strong> To Be Announced</p>
    </div>
</section>

<section id="schedule">
    <h2>Program</h2>
    <div class="card">
        <p>💍 Ceremony - 3:00 PM</p>
        <p>📸 Photos - 4:30 PM</p>
        <p>🍽 Reception - 6:00 PM</p>
    </div>
</section>

<section id="rsvp">
    <h2>RSVP</h2>
    <div class="card">
        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Email"><br>
        <textarea placeholder="Message"></textarea><br>
        <button onclick="alert('RSVP Sent!')">Send RSVP</button>
    </div>
</section>

</div>

<!-- MUSIC -->
<audio id="music" src="wedding-music.mp3"></audio>

<script>
function openInvite() {
    document.getElementById('entry').style.opacity = '0';

    setTimeout(() => {
        document.getElementById('entry').style.display = 'none';
        document.getElementById('site').style.display = 'block';
    }, 500);

    document.getElementById('music').play();

    // Confetti effect
    for (let i = 0; i < 40; i++) {
        let c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = ['#fff', '#ffd700', '#ffb6c1'][Math.floor(Math.random()*3)];
        c.style.animationDuration = (2 + Math.random()*2) + 's';
        document.body.appendChild(c);

        setTimeout(() => c.remove(), 4000);
    }
}
</script>

</body>
</html>
