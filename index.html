<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation | Roel & Mailyn</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    z-index: 1000;
}

nav a {
    color: #fff;
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 2px;
}

/* HERO */
.hero {
    height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    padding: 0 20px;
}

/* 🎬 CINEMATIC ZOOM BACKGROUND */
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("wedding2.jpg") center center / cover no-repeat;
    animation: zoomIn 10s ease-out forwards;
    z-index: -1;
}

@keyframes zoomIn {
    from {
        transform: scale(1.15);
    }
    to {
        transform: scale(1);
    }
}

/* INTRO TEXT */
.intro-text {
    font-size: 0.9rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 1.5s ease forwards;
}

/* 💍 NAMES CONTAINER */
.names {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3.5rem, 12vw, 5.5rem);
    line-height: 1.1;

    /* 👇 makes names lower */
    transform: translateY(20px);
}

/* ✨ LETTER ANIMATION */
.names span {
    display: inline-block;
    opacity: 0;
    transform: translateY(25px);
    animation: letterIn 0.8s ease forwards;
}

@keyframes letterIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* delay per letter */
.names span {
    animation-delay: calc(var(--i) * 0.06s);
}

/* fade helper */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* SECTIONS */
section {
    padding: 80px 20px;
    text-align: center;
}

h2 {
    font-size: 1.8rem;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.card {
    max-width: 600px;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
}

/* FORM */
input, textarea {
    width: 90%;
    max-width: 400px;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px 20px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
    margin-top: 10px;
}

/* MOBILE */
@media (max-width: 480px) {
    .intro-text {
        font-size: 0.75rem;
        letter-spacing: 3px;
    }

    .names {
        font-size: 3rem;
        transform: translateY(10px);
    }
}
</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#details">Details</a>
    <a href="#schedule">Schedule</a>
    <a href="#rsvp">RSVP</a>
</nav>

<section class="hero" id="home">
    <p class="intro-text">You are cordially invited to the wedding of</p>

    <h1 class="names">
        <span style="--i:0">R</span><span style="--i:1">o</span><span style="--i:2">e</span><span style="--i:3">l</span>
        <span style="--i:4">&</span>
        <span style="--i:5">M</span><span style="--i:6">a</span><span style="--i:7">i</span><span style="--i:8">l</span><span style="--i:9">y</span><span style="--i:10">n</span>
    </h1>
</section>

<section id="details">
    <h2>Wedding Details</h2>
    <div class="card">
        <p><strong>Date:</strong> Coming Soon</p>
        <p><strong>Venue:</strong> To Be Announced</p>
    </div>
</section>

<section id="schedule">
    <h2>Program</h2>
    <div class="card">
        <p>💍 Ceremony - 3:00 PM</p>
        <p>📸 Photos - 4:30 PM</p>
        <p>🍽 Reception - 6:00 PM</p>
    </div>
</section>

<section id="rsvp">
    <h2>RSVP</h2>
    <div class="card">
        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Email"><br>
        <textarea placeholder="Message"></textarea><br>
        <button onclick="alert('RSVP Sent!')">Send RSVP</button>
    </div>
</section>

</body>
</html>
