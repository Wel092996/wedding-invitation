<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Roel & Mailyn</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: #fff;
            color: #fff;
            overflow-x: hidden;
        }

        /* NAVIGATION */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            min-height: 100vh;
            background: 
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url("wedding2.jpg") center center / cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Vertical Balance */
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            box-sizing: border-box;
            z-index: 2;
        }

        /* Smooth Transition to White Section Below */
        .hero::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20vh; 
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(255,255,255,1) 100%);
            z-index: 1;
        }

        /* Ensures all text is visible over the image */
        .hero-content {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 800px;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.5);
        }

        .intro-text {
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            margin-bottom: 10px;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 10vw, 6.5rem);
            margin: 10px 0;
            line-height: 1.1;
        }

        .invite-message {
            max-width: 600px;
            margin: 20px auto;
            font-weight: 300;
            line-height: 1.8;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
        }

        .countdown-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 5vw, 3rem);
            margin-top: 40px;
            margin-bottom: 20px;
        }

        /* COUNTDOWN GRID */
        .countdown-container {
            display: inline-flex;
            justify-content: center;
            gap: clamp(15px, 4vw, 40px);
            background: rgba(0,0,0,0.2);
            padding: 20px 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .countdown-number { 
            font-size: clamp(1.8rem, 4vw, 2.8rem); 
            font-weight: 500; 
            line-height: 1;
        }

        .countdown-label { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 8px;
            opacity: 0.8;
        }

        /* DETAILS SECTION */
        #details {
            padding: 0;
            margin-top: -50px; 
            position: relative;
            z-index: 6; 
            background: #fff;
        }

        .details-image {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            display: block;
        }

        /* Animation */
        .names span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: letterIn 0.5s ease forwards;
            animation-delay: calc(var(--i) * 0.05s);
        }
        @keyframes letterIn { to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#details">Details</a>
        <a href="#schedule">Schedule</a>
        <a href="#rsvp">RSVP</a>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content">
            <p class="intro-text">You are cordially invited to the wedding of</p>
            
            <h1 class="names">
                <span style="--i:1">R</span><span style="--i:2">o</span><span style="--i:3">e</span><span style="--i:4">l</span>
                <br><span style="--i:5">&</span><br>
                <span style="--i:6">M</span><span style="--i:7">a</span><span style="--i:8">i</span><span style="--i:9">l</span><span style="--i:10">y</span><span style="--i:11">n</span>
            </h1>

            <p class="invite-message">
                Together with love and happiness, we invite you to witness and celebrate the beginning of our married life. We would be honored to have you with us.
            </p>

            <h2 class="countdown-title">Countdown to Forever</h2>

            <div class="countdown-container">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">00</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-label">Hrs</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-label">Min</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-label">Sec</span>
                </div>
            </div>
        </div>
    </section>

    <section id="details">
        <img src="ok.png" alt="Wedding Details" class="details-image">
    </section>

    <script>
        const weddingDate = new Date("June 8, 2026 09:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            
            if (distance < 0) return;

            document.getElementById("days").innerText = String(Math.floor(distance / (1000 * 60 * 60 * 24))).padStart(2, "0");
            document.getElementById("hours").innerText = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, "0");
            document.getElementById("minutes").innerText = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, "0");
            document.getElementById("seconds").innerText = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, "0");
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
