<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation | Roel & Mailyn</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    z-index: 1000;
}

nav a {
    color: #fff;
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 2px;
}

/* HERO */
.hero {
    position: relative;
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("wedding2.jpg") center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 20px;
}

/* FADE TO RUSTY PINK */
.hero::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 180px;
    background: linear-gradient(to bottom, rgba(0,0,0,0), #F3D6D8);
}

/* TEXT */
.intro-text {
    font-size: 0.9rem;
    letter-spacing: 5px;
    text-transform: uppercase;
}

.names {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3.5rem, 12vw, 5.5rem);
    margin: 0;
}

.names span {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
    animation: letterIn 0.5s ease forwards;
    animation-delay: calc(var(--i) * 0.05s);
}

@keyframes letterIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.invite-message {
    max-width: 600px;
    margin-top: 40px;
}

/* SECTIONS (RUSTY PINK) */
section {
    padding: 80px 20px;
    text-align: center;
    background: #F3D6D8;
    color: #4A2E2E;
}

/* DETAILS POSITION */
#details {
    margin-top: -40px;
}

/* DATE / VENUE CARD */
#details .card {
    width: 95%;
    max-width: 900px;
    margin: auto;

    background: rgba(255,255,255,0.5);
    color: #4A2E2E;

    padding: 30px 20px 70px; /* extra space below */

    border-radius: 12px;
    box-sizing: border-box;
}

/* OTHER CARDS */
.card {
    max-width: 600px;
    margin: auto;
    background: rgba(255,255,255,0.5);
    padding: 20px;
    border-radius: 12px;
    color: #4A2E2E;
}

/* FORM */
input, textarea {
    width: 90%;
    max-width: 400px;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
}

button {
    padding: 10px 20px;
    border: none;
    background: #4A2E2E;
    color: #fff;
    cursor: pointer;
}

/* MOBILE FIX */
@media (max-width: 480px) {
    #details .card {
        width: 95%;
        padding: 25px 15px 60px;
    }
}
</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#details">Details</a>
    <a href="#schedule">Schedule</a>
    <a href="#rsvp">RSVP</a>
</nav>

<section class="hero" id="home">
    <p class="intro-text">You are cordially invited to the wedding of</p>

    <h1 class="names">
        <span style="--i:1">R</span><span style="--i:2">o</span><span style="--i:3">e</span><span style="--i:4">l</span>
        <br>
        <span style="--i:5">&</span>
        <br>
        <span style="--i:6">M</span><span style="--i:7">a</span><span style="--i:8">i</span><span style="--i:9">l</span><span style="--i:10">y</span><span style="--i:11">n</span>
    </h1>

    <p class="invite-message">
        Together with love and happiness, we invite you to celebrate with us.
    </p>
</section>

<section id="details">
    <div class="card">
        <p><strong>Date:</strong> Coming Soon</p>
        <p><strong>Venue:</strong> To Be Announced</p>
    </div>
</section>

<section id="schedule">
    <h2>Program</h2>
    <div class="card">
        <p>💍 Ceremony - 3:00 PM</p>
        <p>📸 Photos - 4:30 PM</p>
        <p>🍽 Reception - 6:00 PM</p>
    </div>
</section>

<section id="rsvp">
    <h2>RSVP</h2>
    <div class="card">
        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Email"><br>
        <textarea placeholder="Message"></textarea><br>
        <button onclick="alert('RSVP Sent!')">Send RSVP</button>
    </div>
</section>

</body>
</html>
