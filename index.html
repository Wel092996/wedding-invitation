<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Roel & Mailyn</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url("wedding2.jpg") center center / cover no-repeat;
        }

        .hero-content {
            max-width: 800px;
            padding: 20px;
        }

        .top-invite {
            letter-spacing: 3px;
            font-size: clamp(0.85rem, 3vw, 1.1rem);
            font-weight: 300;
            margin-bottom: 10px;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 10vw, 6.5rem);
            line-height: 1.1;
            margin: 7vh 0 2vh 0;
            color: #fff;
            animation: nameIntro 2s ease forwards, fadeNames 4s ease-in-out infinite 2s;
            text-shadow: 0 6px 18px rgba(0,0,0,0.45);
        }

        @keyframes nameIntro {
            0% { opacity: 0; letter-spacing: 12px; transform: translateY(20px); }
            100% { opacity: 1; letter-spacing: 0px; transform: translateY(0px); }
        }

        @keyframes fadeNames {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .letter {
            display: inline-block;
            opacity: 0;
            animation: letterFade 0.6s forwards;
            animation-delay: calc(var(--i) * 0.12s);
        }

        @keyframes letterFade {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .uniform-text {
            letter-spacing: 1.5px;
            font-size: clamp(0.75rem, 3vw, 0.9rem);
            font-weight: 300;
        }

        .invite-message {
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
            text-shadow: 0px 2px 6px rgba(0,0,0,0.6);
        }

        .countdown-wrapper { margin-top: 40px; }

        .countdown-title {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.7rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .countdown-container {
            display: inline-flex;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            padding: 10px 18px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .countdown-item { min-width: 45px; }

        .countdown-number {
            font-size: 1.5rem;
            font-weight: 600;
            display: block;
        }

        .countdown-label {
            font-size: 0.5rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        #details, #entourage {
            width: 100%;
            background: #fff;
            line-height: 0;
            margin: 0;
            padding: 0;
        }

        .details-image, .entourage-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .location-section {
            padding: 35px 20px 30px;
            text-align: center;
            background: #fff;
            color: #4A2E2E;
        }

        .location-section h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .location-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .location-card {
            flex: 1;
            min-width: 250px;
            max-width: 350px;
            padding: 25px;
            font-size: 1.15rem;
            background: #fdfaf9;
            border-radius: 12px;
            border: 1px solid #eee;
            line-height: 1.6;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }

        .location-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .location-icon {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .location-icon:hover,
        .location-icon:active {
            transform: scale(1.15) rotate(6deg);
        }

        .map-btn {
            display: inline-block;
            padding: 8px 20px;
            border: 1px solid #4A2E2E;
            color: #4A2E2E;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.65rem;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#details">Details</a>
    <a href="#entourage">Entourage</a>
    <a href="#rsvp">RSVP</a>
</nav>

<!-- EXISTING CONTENT UNCHANGED ABOVE -->

<section id="entourage">
    <img src="ENTO.png" class="entourage-image" alt="Entourage">
</section>

<!-- ✅ RSVP SECTION (ADDED ONLY) -->
<section id="rsvp" style="background:#fff; padding:50px 20px; text-align:center; color:#4A2E2E;">
    <h2 style="font-family:'Great Vibes', cursive; font-size:3rem;">RSVP</h2>

    <form action="YOUR_FORM_ACTION_URL"
          method="POST"
          target="hidden_iframe"
          style="max-width:400px; margin:20px auto; display:flex; flex-direction:column; gap:12px;">

        <input name="entry.1111111111" placeholder="Full Name" required style="padding:12px; border-radius:8px; border:1px solid #ccc;">
        
        <select name="entry.2222222222" required style="padding:12px; border-radius:8px; border:1px solid #ccc;">
            <option value="">Will you attend?</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <input name="entry.3333333333" type="number" min="0"
        placeholder="Guests (excluding yourself)"
        style="padding:12px; border-radius:8px; border:1px solid #ccc;">

        <button type="submit"
        style="padding:12px; background:#4A2E2E; color:#fff; border:none; border-radius:25px;">
        SEND RSVP
        </button>

    </form>

    <iframe name="hidden_iframe" style="display:none;"></iframe>
    <p id="rsvpResponse"></p>
</section>

<script>
document.querySelector("#rsvp form").addEventListener("submit", function () {
    setTimeout(() => {
        document.getElementById("rsvpResponse").innerText =
        "Thank you! Your RSVP has been submitted.";
    }, 500);
});
</script>

</body>
</html>
