<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Keeps it to one page */
            font-family: 'Montserrat', sans-serif;
        }

        .hero-image {
            /* This sets your photo as the full background */
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url("wedding2.jpg");
            
            height: 100vh; /* Full screen height */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover; /* Makes the photo cover the whole area */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Aligns text towards the top */
            position: relative;
        }

        .intro-text {
            color: white;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            
            /* Spacing from the top of the photo - Katamtaman lang */
            margin-top: 60px; 
            
            /* Add a soft shadow to text so it's readable over any photo */
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            
            padding: 0 20px;
            animation: fadeIn 2.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .intro-text {
                font-size: 0.9rem;
                margin-top: 50px;
            }
        }
    </style>
</head>
<body>

    <div class="hero-image">
        <p class="intro-text">You are cordially invited to the wedding of</p>
    </div>

</body>
</html>
