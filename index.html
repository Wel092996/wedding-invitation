<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Roel & Mailyn</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
        }

        .hero-image {
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url("wedding2.jpg");
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        /* Adjusted Spacing: Moved lower down the page */
        .content-wrapper {
            margin-top: 25vh; /* Increased from 10vh to 25vh to move it lower */
            text-align: center;
            padding: 20px;
        }

        .intro-text {
            color: #ffffff;
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            /* Added more gap between intro and names */
            margin-bottom: 40px; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: fadeInDown 2s ease-out forwards;
        }

        .names {
            font-family: 'Playball', cursive; /* New elegant font */
            font-size: clamp(3.5rem, 12vw, 6rem); 
            color: #ffffff;
            margin: 0;
            opacity: 0;
            /* New Animation: Scale and Fade */
            animation: scaleIn 2.5s cubic-bezier(0.2, 0, 0.2, 1) 0.5s forwards;
        }

        /* 1. Animation for Intro Text */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 2. New Animation for Names: Gently grows and appears */
        @keyframes scaleIn {
            0% { 
                opacity: 0; 
                transform: scale(0.8); 
                text-shadow: 0 0 0px rgba(255,255,255,0);
            }
            100% { 
                opacity: 1; 
                transform: scale(1);
                text-shadow: 0 0 20px rgba(255,255,255,0.6), 2px 2px 15px rgba(0,0,0,0.7);
            }
        }

        /* Mobile Fixes */
        @media (max-width: 600px) {
            .content-wrapper { margin-top: 30vh; } /* Even lower on mobile */
            .intro-text { font-size: 0.8rem; margin-bottom: 30px; }
            .names { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <main class="hero-image">
        <div class="content-wrapper">
            <p class="intro-text">You are cordially invited to the wedding of</p>
            <h1 class="names">Roel & Mailyn</h1>
        </div>
    </main>

</body>
</html>
