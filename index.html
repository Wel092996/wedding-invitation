<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Roel & Mailyn</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        /* 1. GLOBAL LAYOUT */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Keeps it to one perfect page */
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
        }

        /* 2. FULL SCREEN BACKGROUND */
        .hero-image {
            /* Ensure 'wedding2.jpg' is the exact name of your file on GitHub */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url("wedding2.jpg");
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        /* 3. POSITIONING (Lowered spacing) */
        .content-wrapper {
            margin-top: 10vh; /* Starts 35% down the screen */
            text-align: center;
            padding: 20px;
        }

        /* 4. INTRO TEXT STYLING */
        .intro-text {
            color: #ffffff;
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 60px; /* Large gap between intro and names */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: fadeInDown 2s ease-out forwards;
        }

        /* 5. NAMES STYLING (Thin & Glowing) */
        .names {
            font-family: 'Alex Brush', cursive;
            font-size: clamp(3.5rem, 12vw, 5.5rem); 
            font-weight: 300;
            color: #ffffff;
            margin: 0;
            opacity: 0;
            /* Combined Animations: Scale in and then the infinite shimmer */
            animation: 
                lightScale 3s ease-out 0.5s forwards,
                gentlePulse 4s ease-in-out infinite alternate;
        }

        /* 6. ANIMATIONS */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes lightScale {
            0% { 
                opacity: 0; 
                transform: scale(0.95); 
                letter-spacing: 8px;
            }
            100% { 
                opacity: 1; 
                transform: scale(1);
                letter-spacing: 2px;
                text-shadow: 0 0 12px rgba(255,255,255,0.5), 1px 1px 3px rgba(0,0,0,0.3);
            }
        }

        @keyframes gentlePulse {
            from { text-shadow: 0 0 10px rgba(255,255,255,0.3), 1px 1px 3px rgba(0,0,0,0.3); }
            to { text-shadow: 0 0 20px rgba(255,255,255,0.7), 1px 1px 5px rgba(0,0,0,0.4); }
        }

        /* 7. MOBILE OPTIMIZATION */
        @media (max-width: 600px) {
            .content-wrapper { margin-top: 40vh; } /* Moves even lower on small phones */
            .intro-text { font-size: 0.75rem; margin-bottom: 40px; }
            .names { font-size: 3.8rem; }
        }
    </style>
</head>
<body>

    <main class="hero-image">
        <div class="content-wrapper">
            <p class="intro-text">You are cordially invited to the wedding of</p>
            <h1 class="names">Roel & Mailyn</h1>
        </div>
    </main>

</body>
</html>
