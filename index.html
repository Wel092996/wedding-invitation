<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdfaf6; /* Creamy elegant background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: #5a4a42;
        }

        .container {
            text-align: center;
            padding: 20px;
            /* Fade-in animation */
            animation: fadeIn 2s ease-in;
        }

        .intro-text {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.8;
            /* Spacing from the very top */
            margin-top: 40px; 
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #8d6e63;
            margin-bottom: 30px;
        }

        .invitation-image {
            width: 90%;
            max-width: 500px;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* Soft shadow for depth */
            border: 8px solid white; /* Photo frame effect */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .names { font-size: 2.5rem; }
            .intro-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="intro-text">You are cordially invited to the wedding of</p>
        
        <img src="wedding1.jpg" alt="Wedding Invitation" class="invitation-image">
    </div>

</body>
</html>
