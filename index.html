<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Roel & Mailyn</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <style>
        /* BASE RESET */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: #fff;
            color: #fff;
            overflow-x: hidden;
        }

        /* NAVIGATION BAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            min-height: 100vh;
            background: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url("wedding2.jpg") center center / cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 0;
            box-sizing: border-box;
            z-index: 2;
        }

        /* THE SEAMLESS FADE TO WHITE */
        .hero::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 350px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(255,255,255,1) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .hero > * {
            position: relative;
            z-index: 5;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 10vw, 6.5rem);
            margin-top: 50px;
            margin-bottom: 25px;
            line-height: 1.1;
        }

        .names span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: letterIn 0.5s ease forwards;
            animation-delay: calc(var(--i) * 0.05s);
        }

        @keyframes letterIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .countdown-container {
            display: flex;
            gap: clamp(10px, 4vw, 35px);
            margin-bottom: 100px;
        }

        .countdown-number { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 500; }
        .countdown-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

        /* DETAILS SECTION WITH details2.png BACKGROUND */
        #details {
            padding: 0;
            margin-top: -120px; /* Pull up overlap for Desktop */
            position: relative;
            z-index: 0; 
            line-height: 0;
            background-image: url("./details2.png"); 
            background-position: top center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .details-image {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
            /* Fades the top edge of the overlay image */
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%);
        }

        /* LOWER SECTIONS */
        section:not(.hero):not(#details) {
            padding: 100px 20px;
            text-align: center;
            background: #fff;
            color: #4A2E2E;
        }

        .card {
            max-width: 600px;
            margin: auto;
            background: rgba(253, 244, 245, 0.9); 
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; margin-bottom: 30px; }

        input, textarea {
            width: 100%;
            max-width: 450px;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(74, 46, 46, 0.1);
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        button {
            padding: 15px 50px;
            background: #4A2E2E;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* MOBILE FIXES - PREVENTS TEXT CROPPING */
        @media (max-width: 480px) {
            .hero { padding-top: 100px; }
            
            #details { 
                margin-top: -40px; /* Reduced overlap so "The Details" text drops down */
            } 

            .details-image {
                /* Narrower mask on mobile so it doesn't wash out the text */
                mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 8%);
                -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 8%);
            }

            .countdown-container { margin-bottom: 60px; }
            .names { font-size: 3.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#details">Details</a>
        <a href="#schedule">Schedule</a>
        <a href="#rsvp">RSVP</a>
    </nav>

    <section class="hero" id="home">
        <p>You are cordially invited to the wedding of</p>
        <h1 class="names">
            <span style="--i:1">R</span><span style="--i:2">o</span><span style="--i:3">e</span><span style="--i:4">l</span>
            <br><span style="--i:5">&</span><br>
            <span style="--i:6">M</span><span style="--i:7">a</span><span style="--i:8">i</span><span style="--i:9">l</span><span style="--i:10">y</span><span style="--i:11">n</span>
        </h1>
        <h2 style="font-family: 'Great Vibes', cursive;">Countdown to Forever</h2>
        <div class="countdown-container">
            <div class="countdown-item"><span class="countdown-number" id="days">00</span><br><span class="countdown-label">Days</span></div>
            <div class="countdown-item"><span class="countdown-number" id="hours">00</span><br><span class="countdown-label">Hrs</span></div>
            <div class="countdown-item"><span class="countdown-number" id="minutes">00</span><br><span class="countdown-label">Min</span></div>
            <div class="countdown-item"><span class="countdown-number" id="seconds">00</span><br><span class="countdown-label">Sec</span></div>
        </div>
    </section>

    <section id="details">
        <img src="details.png" alt="Wedding Details" class="details-image">
    </section>

    <section id="schedule">
        <h2>Program</h2>
        <div class="card">
            <p>💍 Ceremony - 9:00 AM</p>
            <p>📸 Photos - 10:30 AM</p>
            <p>🍽 Reception - 12:00 PM</p>
        </div>
    </section>

    <section id="rsvp">
        <h2>RSVP</h2>
        <div class="card">
            <input type="text" placeholder="Your Name" required><br>
            <input type="email" placeholder="Email Address" required><br>
            <textarea placeholder="Message" rows="4"></textarea><br>
            <button type="submit">Submit RSVP</button>
        </div>
    </section>

    <script>
        const weddingDate = new Date("June 8, 2026 09:00:00").getTime();
        setInterval(function () {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            document.getElementById("days").innerText = String(Math.floor(distance / (1000 * 60 * 60 * 24))).padStart(2, "0");
            document.getElementById("hours").innerText = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, "0");
            document.getElementById("minutes").innerText = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, "0");
            document.getElementById("seconds").innerText = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, "0");
        }, 1000);
    </script>
</body>
</html>
